name: Docker Image Sync to CNB

on:
  push:
    paths:
      - 'images.txt'

env:
  CNB_REGISTRY: ${{ secrets.CNB_REGISTRY }}
  CNB_REPO_SLUG: ${{ secrets.CNB_REPO_SLUG_LOWERCASE }}

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 CNB Docker 制品库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CNB_REGISTRY }}
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      - name: 读取镜像列表并同步
        run: |
          # 读取 images.txt 文件中的镜像列表
          while IFS= read -r image || [[ -n "$image" ]]; do
            # 跳过空行和注释行
            [[ -z "$image" || "$image" =~ ^#.*$ ]] && continue
            
            echo "处理镜像: $image"
            
            # 拉取镜像
            docker pull $image
            
            # 解析镜像名称和标签
            IFS=':' read -r name tag <<< "$image"
            [[ -z "$tag" ]] && tag="latest"
            
            # 处理可能包含额外层级的镜像名称
            # 例如: docker.io/library/nginx -> library/nginx
            #       registry.example.com/myapp/web -> myapp/web
            IFS='/' read -r prefix rest <<< "$name"
            if echo "$rest" | grep -q '/'; then
              # 有多层路径，取最后两部分作为 repo
              repo=$(echo "$rest" | tr '/' '-' )
            else
              repo="$name"
            fi
            
            # 构建目标镜像名称
            # 格式: docker.cnb.cool/lufei123/lufei-docker/repo:tag
            target_image="${CNB_REGISTRY}/${CNB_REPO_SLUG}/${repo}:${tag}"
            
            # 标记镜像
            docker tag $image $target_image
            
            # 推送镜像到 CNB
            docker push $target_image
            
            echo "镜像 $image 同步完成，已推送到 $target_image"
          done < images.txt